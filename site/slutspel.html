<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0f">
  <title>Slutspel · JVC 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div class="brand">JVC <span class="accent">26</span></div>
        <div class="updated" id="updated">Laddar…</div>
      </div>
      <nav class="nav">
        <a href="index.html">Tidslinje</a>
        <a href="grupper.html">Grupper</a>
        <a href="slutspel.html" class="active">Slutspel</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Slutspel</h1>
      <div class="sub">HK Järnvägens lag i cup-slutspelen</div>
    </section>

    <div id="content"><div class="empty">Laddar…</div></div>
  </main>

  <footer class="footer">
    <div class="container"><span class="heja">Heja gula och svarta</span></div>
  </footer>

  <script src="teams.js"></script>
  <script src="app.js"></script>
  <script>
    (async function() {
      const content = JVC.$("#content");
      const updated = JVC.$("#updated");
      try {
        const [playoffs, meta] = await Promise.all([
          JVC.fetchJson("playoffs.json"),
          JVC.fetchJson("last_updated.json"),
        ]);
        updated.textContent = `Uppdaterad ${JVC.fmtRelative(meta.iso)}`;
        content.innerHTML = "";

        const teams = playoffs.teams || [];
        if (!teams.length) {
          content.innerHTML = '<div class="empty">Slutspelet publiceras under cupdagen.</div>';
          return;
        }

        // Statusgrupper
        const active = teams.filter(t => t.status === "ongoing" || t.status === "won_awaiting_next" || t.status === "champion");
        const eliminated = teams.filter(t => t.status === "eliminated" || t.status === "drew");

        function statusLabel(t) {
          if (t.status === "champion") return "🏆 Mästare";
          if (t.status === "eliminated") return "Utslaget";
          if (t.status === "drew") return "Oavgjort (straffar avgjorde)";
          if (t.status === "won_awaiting_next") return "Vidare — väntar på lottning";
          return ""; // ongoing
        }

        function renderTeam(t) {
          const klass = t.klass;
          const squad = t.squad ? ` ${t.squad}` : "";
          const colors = window.JVC_TEAMS.classColor(klass);
          const lm = t.latest_match || {};
          const isElim = t.status === "eliminated" || t.status === "drew";

          const card = JVC.el("div", { class: `playoff-card ${isElim ? "is-elim" : ""}` });

          const head = JVC.el("div", { class: "playoff-head" });
          head.appendChild(JVC.el("span", {
            class: "team-pill",
            text: klass,
            style: `background:${colors.bg};color:${colors.fg};`
          }));
          head.appendChild(JVC.el("span", { class: "playoff-squad", text: `HK Järnvägen${squad}` }));
          card.appendChild(head);

          const meta = JVC.el("div", { class: "playoff-meta" });
          meta.appendChild(JVC.el("span", { class: "playoff-bracket", text: `${t.abcd}-Slutspel` }));
          meta.appendChild(JVC.el("span", { class: "playoff-round", text: t.current_round_label }));
          card.appendChild(meta);

          if (isElim) {
            card.appendChild(JVC.el("div", { class: "playoff-elim", text: statusLabel(t) }));
          } else {
            // Visa nästa match — tid, bana och resultat om matchen ligger i nutid
            const row = JVC.el("div", { class: "playoff-next" });
            row.appendChild(JVC.el("span", { class: "playoff-tid", text: lm.tid || "?" }));
            if (lm.bana) row.appendChild(JVC.el("span", { class: "playoff-bana", text: lm.bana }));
            if (lm.resultat) {
              row.appendChild(JVC.el("span", { class: "playoff-result win", text: lm.resultat.replace("-", " – ") }));
            } else if (t.status === "won_awaiting_next") {
              row.appendChild(JVC.el("span", { class: "playoff-tag", text: statusLabel(t) }));
            }
            card.appendChild(row);
          }
          return card;
        }

        if (active.length) {
          content.appendChild(JVC.el("div", { class: "section-title", text: `${active.length} lag kvar i slutspelet` }));
          for (const t of active) content.appendChild(renderTeam(t));
        }
        if (eliminated.length) {
          content.appendChild(JVC.el("div", { class: "section-title elim-title", text: `Utslagna (${eliminated.length})` }));
          for (const t of eliminated) content.appendChild(renderTeam(t));
        }
      } catch (e) {
        console.error(e);
        content.innerHTML = `<div class="empty">Kunde inte ladda data.<br><small>${e.message}</small></div>`;
      }
    })();
  </script>
</body>
</html>
