<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0f">
  <title>Slutspel · JVC 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div class="brand">JVC <span class="accent">26</span></div>
        <div class="updated" id="updated">Laddar…</div>
      </div>
      <nav class="nav">
        <a href="index.html">Tidslinje</a>
        <a href="grupper.html">Grupper</a>
        <a href="slutspel.html" class="active">Slutspel</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Slutspel</h1>
      <div class="sub">HK Järnvägens lag i cup-slutspelen</div>
    </section>

    <div id="content"><div class="empty">Laddar…</div></div>
  </main>

  <footer class="footer">
    <div class="container"><span class="heja">Heja gula och svarta</span></div>
  </footer>

  <script src="teams.js"></script>
  <script src="app.js"></script>
  <script>
    (async function() {
      const content = JVC.$("#content");
      const updated = JVC.$("#updated");
      try {
        const [playoffs, meta] = await Promise.all([
          JVC.fetchJson("playoffs.json"),
          JVC.fetchJson("last_updated.json"),
        ]);
        updated.textContent = `Uppdaterad ${JVC.fmtRelative(meta.iso)}`;
        content.innerHTML = "";

        const teams = playoffs.teams || [];
        if (!teams.length) {
          content.innerHTML = '<div class="empty">Slutspelet publiceras under cupdagen.</div>';
          return;
        }

        const active = teams.filter(t => t.status === "ongoing" || t.status === "won_awaiting_next" || t.status === "champion");
        const eliminated = teams.filter(t => t.status === "eliminated" || t.status === "drew");

        function banaNumber(bana) {
          if (!bana) return null;
          const m = String(bana).match(/(\d+)/);
          return m ? m[1] : bana;
        }

        function renderTeam(t) {
          const klass = t.klass;
          const colors = window.JVC_TEAMS.classColor(klass);
          const lm = t.latest_match || {};
          const isElim = t.status === "eliminated" || t.status === "drew";
          const isChamp = t.status === "champion";

          // Bestäm outcome-färg om matchen är spelad
          let outcomeClass = "";
          if (lm.resultat) {
            const sc = JVC.parseScore(lm.resultat);
            if (sc) {
              const hk = lm.is_home ? sc.home : sc.away;
              const op = lm.is_home ? sc.away : sc.home;
              if (hk > op) outcomeClass = "is-win";
              else if (hk < op) outcomeClass = "is-loss";
              else outcomeClass = "is-draw";
            }
          }

          const card = JVC.el("div", {
            class: `match playoff-card ${isElim ? "is-loss" : outcomeClass}`.trim()
          });

          // Toppraden: klass-pill, HK-namn, status-badge
          const top = JVC.el("div", { class: "match-top" });
          top.appendChild(JVC.el("span", {
            class: "team-pill",
            text: klass,
            style: `background:${colors.bg};color:${colors.fg};`
          }));
          top.appendChild(JVC.el("span", { class: "playoff-team-name", text: `HK Järnvägen${t.squad ? " " + t.squad : ""}` }));
          if (isChamp) top.appendChild(JVC.el("span", { class: "badge champion", text: "🏆 MÄSTARE" }));
          else if (isElim) top.appendChild(JVC.el("span", { class: "badge done", text: "UTSLAGEN" }));
          else if (t.status === "won_awaiting_next") top.appendChild(JVC.el("span", { class: "badge next", text: "VIDARE" }));
          else top.appendChild(JVC.el("span", { class: "badge next", text: "NÄSTA" }));
          card.appendChild(top);

          // Rond + tid-rad
          const roundRow = JVC.el("div", { class: "playoff-round-row" });
          roundRow.appendChild(JVC.el("span", { class: "playoff-bracket", text: `${t.abcd}-Slutspel` }));
          roundRow.appendChild(JVC.el("span", { class: "playoff-round-label", text: t.current_round_label }));
          if (lm.tid) {
            roundRow.appendChild(JVC.el("span", { class: "playoff-tid", text: lm.tid }));
          }
          card.appendChild(roundRow);

          // Match-rad (samma struktur som index.html)
          const row = JVC.el("div", { class: "match-row" });
          row.appendChild(JVC.el("div", {
            class: `match-team home ${lm.is_home ? "hk" : ""}`.trim(),
            text: lm.hemmalag || "?"
          }));

          const vs = JVC.el("div", { class: "match-vs" });
          if (lm.resultat) {
            vs.classList.add(outcomeClass.replace("is-", ""));
            vs.textContent = lm.resultat.replace("-", " – ");
          } else {
            vs.textContent = "–";
          }
          row.appendChild(vs);

          row.appendChild(JVC.el("div", {
            class: `match-team away ${!lm.is_home ? "hk" : ""}`.trim(),
            text: lm.bortalag || "?"
          }));

          const banaNum = banaNumber(lm.bana);
          if (banaNum) {
            const gate = JVC.el("div", { class: "match-gate" });
            gate.appendChild(JVC.el("div", { class: "gate-label", text: "Bana" }));
            gate.appendChild(JVC.el("div", { class: "gate-num", text: banaNum }));
            row.appendChild(gate);
          } else {
            row.appendChild(JVC.el("div"));
          }
          card.appendChild(row);

          return card;
        }

        if (active.length) {
          content.appendChild(JVC.el("div", { class: "section-title", text: `${active.length} lag kvar i slutspelet` }));
          for (const t of active) content.appendChild(renderTeam(t));
        }
        if (eliminated.length) {
          content.appendChild(JVC.el("div", { class: "section-title elim-title", text: `Utslagna (${eliminated.length})` }));
          for (const t of eliminated) content.appendChild(renderTeam(t));
        }

        // ─── Slutspelsträd per klass ───
        const ROUND_ORDER = ["1/16", "1/8", "Kvart", "Semi", "Brons", "Final"];
        const ROUND_LABELS_LONG = {
          "1/16": "Sextondelsfinal",
          "1/8": "Åttondelsfinal",
          "Kvart": "Kvartsfinal",
          "Semi": "Semifinal",
          "Brons": "Bronsmatch",
          "Final": "Final"
        };

        function classAge(klass) {
          const ns = String(klass).match(/\d+/g) || [];
          return ns.length ? Math.max(...ns.map(Number)) : 0;
        }

        // Gruppera alla slutspelsmatcher per (klass, abcd)
        const allPlayoff = playoffs.all_matches || [];
        const byBracket = new Map();
        for (const m of allPlayoff) {
          const key = `${m.klass}|${m.abcd}`;
          if (!byBracket.has(key)) byBracket.set(key, []);
          byBracket.get(key).push(m);
        }
        // Sortera brackets: U19 → U12, A före B inom ålder
        const brackets = [...byBracket.keys()].sort((a, b) => {
          const [ka, aba] = a.split("|");
          const [kb, abb] = b.split("|");
          const ageDiff = classAge(kb) - classAge(ka);
          if (ageDiff !== 0) return ageDiff;
          if (ka !== kb) return ka.localeCompare(kb);
          return aba.localeCompare(abb);
        });

        if (brackets.length) {
          content.appendChild(JVC.el("div", { class: "section-title bracket-title", text: "Slutspelsträd per klass" }));
          for (const key of brackets) {
            const [klass, abcd] = key.split("|");
            const matches = byBracket.get(key);
            const colors = window.JVC_TEAMS.classColor(klass);
            const wrap = JVC.el("div", { class: "bracket" });

            const head = JVC.el("div", { class: "bracket-head" });
            head.appendChild(JVC.el("span", {
              class: "team-pill",
              text: klass,
              style: `background:${colors.bg};color:${colors.fg};`
            }));
            head.appendChild(JVC.el("span", { class: "bracket-label", text: `${abcd}-Slutspel` }));
            wrap.appendChild(head);

            // Gruppera matcher per rond
            const byRound = new Map();
            for (const m of matches) {
              const r = m.round_short || "?";
              if (!byRound.has(r)) byRound.set(r, []);
              byRound.get(r).push(m);
            }
            const sortedRounds = [...byRound.keys()].sort((a, b) => ROUND_ORDER.indexOf(a) - ROUND_ORDER.indexOf(b));

            for (const r of sortedRounds) {
              const roundWrap = JVC.el("div", { class: "bracket-round" });
              const roundHead = JVC.el("div", { class: "bracket-round-head" });
              roundHead.appendChild(JVC.el("span", { class: "bracket-round-name", text: ROUND_LABELS_LONG[r] || r }));
              roundHead.appendChild(JVC.el("span", { class: "bracket-round-count", text: `${byRound.get(r).length} match${byRound.get(r).length > 1 ? "er" : ""}` }));
              roundWrap.appendChild(roundHead);

              const ms = byRound.get(r).slice().sort((a, b) => (a.iso_start || "").localeCompare(b.iso_start || ""));
              for (const m of ms) {
                const hkHome = /järnvägen/i.test(m.hemmalag || "");
                const hkAway = /järnvägen/i.test(m.bortalag || "");
                const isHk = hkHome || hkAway;

                // Outcome ur HK:s perspektiv (om HK är inblandad), annars neutral
                let scoreClass = "pending";
                if (m.resultat) {
                  const sc = JVC.parseScore(m.resultat);
                  if (sc) {
                    if (isHk) {
                      const hk = hkHome ? sc.home : sc.away;
                      const op = hkHome ? sc.away : sc.home;
                      scoreClass = hk > op ? "win" : hk < op ? "loss" : "draw";
                    } else {
                      scoreClass = "neutral";
                    }
                  }
                }
                const score = m.resultat ? m.resultat.replace("-", " – ") : "–";
                const isPlaceholder = (s) => /^vinn\.|^\d:an från|^förl\./i.test(s || "");

                const row = JVC.el("div", { class: `bracket-match ${isHk ? "is-hk" : ""}` });
                row.innerHTML = `
                  <span class="bm-tid">${m.tid || ""}</span>
                  <span class="bm-team home ${hkHome ? "hk" : ""} ${isPlaceholder(m.hemmalag) ? "ph" : ""}">${m.hemmalag || "?"}</span>
                  <span class="bm-score ${scoreClass}">${score}</span>
                  <span class="bm-team away ${hkAway ? "hk" : ""} ${isPlaceholder(m.bortalag) ? "ph" : ""}">${m.bortalag || "?"}</span>
                  <span class="bm-bana">${m.bana || ""}</span>
                `;
                roundWrap.appendChild(row);
              }
              wrap.appendChild(roundWrap);
            }
            content.appendChild(wrap);
          }
        }
      } catch (e) {
        console.error(e);
        content.innerHTML = `<div class="empty">Kunde inte ladda data.<br><small>${e.message}</small></div>`;
      }
    })();
  </script>
</body>
</html>
