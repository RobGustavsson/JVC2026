name: Scrape procup

on:
  workflow_dispatch: {}
  schedule:
    # Pre-cup: en gång per dag kl 08:00 UTC (10:00 svensk tid)
    - cron: "0 8 * * *"
    # Cup-dagen 30 maj 2026: var 30:e min mellan 06:00–20:00 UTC (08:00–22:00 svensk tid)
    # cron filtrerar inte på datum — scrape.py är idempotent och commit hoppas över om datan är oförändrad
    - cron: "*/30 6-20 * * *"

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit data if changed
        run: |
          git config user.name "jvc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
