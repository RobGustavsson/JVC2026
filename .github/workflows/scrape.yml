name: Scrape & Deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  schedule:
    # Pre-cup: en gång per dag kl 08:00 UTC (10:00 svensk tid)
    - cron: "0 8 * * *"
    # Cup-dagen 30 maj 2026: var 30:e min mellan 06:00–20:00 UTC (08:00–22:00 svensk tid)
    - cron: "*/30 6-20 * * *"

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      # Hoppa över scraping på "push"-trigger — då har en föregående körning redan committat data
      - uses: actions/setup-python@v5
        if: github.event_name != 'push'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        if: github.event_name != 'push'
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        if: github.event_name != 'push'
        run: python scraper/scrape.py

      - name: Commit data if changed
        id: commit
        if: github.event_name != 'push'
        run: |
          git config user.name "jvc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/
          if git diff --cached --quiet; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
            # Retry with rebase if another workflow pushed concurrently
            for i in 1 2 3; do
              if git push; then
                echo "changed=true" >> "$GITHUB_OUTPUT"
                break
              fi
              echo "push rejected, rebasing and retrying ($i)..."
              git pull --rebase --autostash origin main
            done
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.scrape.outputs.data_changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
