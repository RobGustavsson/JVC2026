name: Scrape & Deploy

on:
  workflow_dispatch:
    inputs:
      loop_minutes:
        description: 'Long-poll: kör i så här många minuter och scrapa var 10:e (lämna 0 = enkelt pass)'
        required: false
        default: '0'
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"
    - cron: "*/10 6-20 * * *"

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    outputs:
      data_changed: ${{ steps.scrape.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: github.event_name != 'push'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        if: github.event_name != 'push'
        run: pip install -r scraper/requirements.txt

      - name: Scrape (one-shot or long-poll)
        id: scrape
        if: github.event_name != 'push'
        env:
          LOOP_MIN: ${{ inputs.loop_minutes || '0' }}
        run: |
          set -e
          git config user.name "jvc2026-bot"
          git config user.email "actions@users.noreply.github.com"

          changed_any=false
          start=$(date +%s)
          # GitHub Actions hard cap ~6h. Stoppa 20 min innan så vi får tid till deploy.
          max_minutes=330
          loop_min=${LOOP_MIN:-0}
          if [ "$loop_min" -gt "$max_minutes" ]; then
            echo "loop_minutes ($loop_min) > max ($max_minutes), kapar."
            loop_min=$max_minutes
          fi

          while true; do
            echo "::group::scrape pass $(date -u +%H:%M:%SZ)"
            python scraper/scrape.py
            git add site/data/
            if ! git diff --cached --quiet; then
              git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
              for i in 1 2 3; do
                if git push; then
                  changed_any=true
                  break
                fi
                echo "push rejected, rebasing and retrying ($i)..."
                git pull --rebase --autostash origin main || true
              done
            else
              echo "No data changes."
            fi
            echo "::endgroup::"

            elapsed=$(( ($(date +%s) - start) / 60 ))
            if [ "$loop_min" -le 0 ] || [ "$elapsed" -ge "$loop_min" ]; then
              break
            fi
            echo "Pass klart efter $elapsed min — sover 10 min innan nästa."
            sleep 600
          done

          echo "changed=$changed_any" >> "$GITHUB_OUTPUT"

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.scrape.outputs.data_changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
